<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMS Debug</title>
<style>
body { font-family: monospace; background: #0f172a; color: #e2e8f0; padding: 16px; font-size: 13px; }
h2 { color: #0d9488; }
.ok { color: #10b981; }
.err { color: #ef4444; }
.warn { color: #f59e0b; }
.info { color: #60a5fa; }
pre { background: #1e293b; padding: 12px; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
button { background: #0d9488; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; margin: 4px; cursor: pointer; }
button.red { background: #ef4444; }
#log { max-height: 60vh; overflow-y: auto; }
</style>
</head>
<body>
<h2>🔍 BMS Debug Panel</h2>
<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
  <button onclick="checkAll()">▶ Jalankan Semua Test</button>
  <button onclick="clearSW()" class="red">🗑 Hapus SW & Cache</button>
  <button onclick="clearLog()">🧹 Clear Log</button>
</div>
<pre id="log">Klik "Jalankan Semua Test"...</pre>

<script>
const logEl = document.getElementById('log');
function log(msg, cls='') {
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = new Date().toLocaleTimeString() + ' ' + msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}
function clearLog() { logEl.innerHTML = ''; }

async function checkAll() {
  clearLog();
  log('=== BMS DEBUG START ===', 'info');
  
  // 1. SW check
  log('--- Service Worker ---', 'info');
  if ('serviceWorker' in navigator) {
    const regs = await navigator.serviceWorker.getRegistrations();
    log(`SW registrasi: ${regs.length} buah`, regs.length > 0 ? 'ok' : 'warn');
    for (const r of regs) {
      log(`  scope: ${r.scope}`, 'info');
      log(`  active: ${r.active?.scriptURL || 'none'}`, r.active ? 'ok' : 'warn');
      log(`  waiting: ${r.waiting?.scriptURL || 'none'}`, r.waiting ? 'warn' : 'ok');
      log(`  installing: ${r.installing?.scriptURL || 'none'}`, r.installing ? 'warn' : 'ok');
      if (r.waiting) {
        log('  ⚠️ SW WAITING! Ada versi baru tertahan.', 'err');
        log('  → Coba: tutup semua tab BMS, buka lagi', 'warn');
      }
    }
    
    const controller = navigator.serviceWorker.controller;
    log(`SW controller aktif: ${controller ? controller.scriptURL : 'TIDAK ADA'}`, controller ? 'ok' : 'warn');
  } else {
    log('Service Worker: TIDAK DIDUKUNG', 'err');
  }
  
  // 2. Cache check
  log('--- Cache Storage ---', 'info');
  const cacheNames = await caches.keys();
  log(`Cache buckets: ${cacheNames.join(', ') || 'kosong'}`, cacheNames.length > 0 ? 'ok' : 'warn');
  for (const name of cacheNames) {
    const c = await caches.open(name);
    const keys = await c.keys();
    log(`  ${name}: ${keys.length} file`, 'info');
    const authCached = keys.find(r => r.url.includes('auth.js'));
    if (authCached) log(`  auth.js cached: ${authCached.url}`, 'info');
  }
  
  // 3. Fetch auth.js langsung dari network
  log('--- Fetch auth.js dari Network ---', 'info');
  try {
    const resp = await fetch('/assets/js/modules/auth.js?nocache=' + Date.now(), { cache: 'no-store' });
    const text = await resp.text();
    log(`auth.js status: ${resp.status}`, resp.ok ? 'ok' : 'err');
    const hasFix = text.includes('FIX v11.1') || text.includes("updateFBStatus('online')");
    log(`auth.js punya FIX v11.1: ${hasFix ? 'YA ✅' : 'TIDAK ❌'}`, hasFix ? 'ok' : 'err');
    if (!hasFix) {
      log('  → File lama masih di-serve oleh GitHub Pages', 'err');
      log('  → Atau SW masih serve dari cache lama', 'err');
    }
    const version = text.match(/v\d+\.\d+/)?.[0] || 'tidak ditemukan';
    log(`  versi terdeteksi: ${version}`, 'info');
  } catch(e) {
    log(`Gagal fetch auth.js: ${e.message}`, 'err');
  }
  
  // 4. Fetch sw.js
  log('--- Fetch sw.js dari Network ---', 'info');
  try {
    const resp = await fetch('/sw.js?nocache=' + Date.now(), { cache: 'no-store' });
    const text = await resp.text();
    log(`sw.js status: ${resp.status}`, resp.ok ? 'ok' : 'err');
    const version = text.match(/bms-cache-v[\d.]+/)?.[0] || 'tidak ditemukan';
    log(`sw.js cache version: ${version}`, 'info');
    const isNew = version === 'bms-cache-v11.2';
    log(`sw.js adalah v11.2: ${isNew ? 'YA ✅' : 'TIDAK ❌ (masih lama)'}`, isNew ? 'ok' : 'err');
  } catch(e) {
    log(`Gagal fetch sw.js: ${e.message}`, 'err');
  }
  
  // 5. Firebase connectivity
  log('--- Firebase ---', 'info');
  try {
    const resp = await fetch('https://firestore.googleapis.com/v1/projects/bms-syafaah/databases/(default)/documents/test/appConfig', {
      cache: 'no-store'
    });
    log(`Firestore appConfig HTTP status: ${resp.status}`, resp.status === 200 ? 'ok' : 'warn');
    if (resp.status === 200) {
      log('Firestore: bisa diakses ✅', 'ok');
    } else if (resp.status === 403) {
      log('Firestore: 403 — Rules BELUM mengizinkan public read', 'err');
      log('  → Deploy Rules v2.2 di Firebase Console', 'err');
    } else {
      log(`Firestore: status ${resp.status}`, 'warn');
    }
  } catch(e) {
    log(`Firestore fetch error: ${e.message}`, 'warn');
  }
  
  // 6. Online status
  log('--- Koneksi ---', 'info');
  log(`Online: ${navigator.onLine ? 'YA ✅' : 'TIDAK ❌'}`, navigator.onLine ? 'ok' : 'err');
  log(`User Agent: ${navigator.userAgent.substring(0, 80)}`, 'info');
  log(`URL: ${location.href}`, 'info');
  
  log('=== DEBUG SELESAI ===', 'info');
}

async function clearSW() {
  log('--- Hapus SW & Cache ---', 'warn');
  // Unregister all SWs
  if ('serviceWorker' in navigator) {
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const r of regs) {
      await r.unregister();
      log(`SW unregistered: ${r.scope}`, 'ok');
    }
  }
  // Clear all caches
  const names = await caches.keys();
  for (const name of names) {
    await caches.delete(name);
    log(`Cache deleted: ${name}`, 'ok');
  }
  log('✅ Selesai! Refresh halaman sekarang.', 'ok');
  setTimeout(() => location.reload(), 2000);
}
</script>
</body>
</html>
